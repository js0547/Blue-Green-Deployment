global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "/etc/prometheus/prometheus-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager-service:9093']

scrape_configs:
  - job_name: 'spring-boot-backend'
    metrics_path: '/actuator/prometheus'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: healthcare-portal
      # Keeps the color label attached to the metrics so we can separate Blue vs Green traffic!
      - source_labels: [__meta_kubernetes_pod_label_color]
        target_label: color
