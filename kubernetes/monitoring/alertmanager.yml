global:
  slack_api_url: 'https://hooks.slack.com/services/T00000/B00000/XXXXXXXXXXXX'

route:
  receiver: 'slack-critical-alerts'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
- name: 'slack-critical-alerts'
  slack_configs:
  - channel: '#healthcare-alerts'
    send_resolved: true
    title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
